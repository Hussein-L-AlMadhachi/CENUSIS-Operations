

services:
  postgres:
    image: postgres:16-alpine
    container_name: cenusis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cenusis_ops}
      POSTGRES_USER: ${DB_USER:-dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345678}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dev} -d ${DB_NAME:-cenusis_ops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cenusis-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cenusis-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cenusis_ops}
      DB_USER: ${DB_USER:-dev}
      DB_PASSWORD: ${DB_PASSWORD:-12345678}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cenusis-network

volumes:
  postgres_data:
    driver: local

networks:
  cenusis-network:
    driver: bridge
